server:
  debug: true
  name: "go-template"
  version: "0.1.0"
  port: ":8080"
  requestTimeout: "15s"
  readTimeout: "5s"
  writeTimeout: "10s"
  ctxDefaultTimeout: "15s"

# Sensitive fields must be supplied via environment variables.
# Viper maps "database.password" → DATABASE_PASSWORD, "database.userName" → DATABASE_USERNAME, etc.
# Never commit real credentials to this file.
database:
  host: "localhost"
  port: 5432
  userName: ""        # override: DATABASE_USERNAME
  password: ""        # override: DATABASE_PASSWORD
  database: "app_db"
  schema: "public"
  maxOpenConns: 25
  maxIdleConns: 5
  connMaxLifetime: "1h"
  connMaxIdleTime: "10m"
  options: ""
  debug: false

redis:
  mode: "single"
  username: ""        # override: REDIS_USERNAME
  password: ""        # override: REDIS_PASSWORD
  masterName: ""
  poolSize: 10
  address:
    - "127.0.0.1:6379"

logger:
  level: "info"
  endcoding: "json"

mqtt:
  broker: "tcp://localhost:1883"
  clientID: "go-template"
  username: ""          # override: MQTT_USERNAME
  password: ""          # override: MQTT_PASSWORD
  connectTimeout: "5s"
  keepAlive: "30s"

# Worker subscription settings.
# Override via env: WORKERS_USEREVENT_TOPIC, WORKERS_USEREVENT_QOS, etc.
workers:
  userEvent:
    topic: "events/user"
    qos: 1

# OpenTelemetry tracing (OTLP/gRPC exporter).
# Override via env: TRACING_ENABLED, TRACING_ENDPOINT, TRACING_INSECURE, TRACING_SAMPLERATIO
tracing:
  enabled: false
  endpoint: "localhost:4317"
  insecure: true
  sampleRatio: 1.0

adapters:
  product:
    baseURL: "https://6a32d564c6ca2aee4385ac36.mockapi.io/api/v1/mock-svc"
    timeout: "10s"
    keepAlive: "90s"
    retryCount: 3
    retryWait: "500ms"
    debug: false
    apiKey: ""        # override: ADAPTERS_PRODUCT_APIKEY
