run:
  timeout: 5m

linters:
  enable:
    # Minimum recommended
    - errcheck
    - goimports
    - revive
    - govet
    - staticcheck
    # Additional recommended
    - gosec
    - ineffassign
    - misspell
    - gocyclo
    - bodyclose

linters-settings:
  goimports:
    local-prefixes: "" # Set to your module path
  revive:
    rules:
      - name: exported
  gocyclo:
    min-complexity: 15

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0