version: "2"

run:
  timeout: 5m

linters:
  enable:
    # Minimum recommended
    - errcheck
    - revive
    - govet
    - staticcheck
    # Additional recommended
    - gosec
    - ineffassign
    - misspell
    - gocyclo
    - bodyclose
  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
    gocyclo:
      min-complexity: 15

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - "github.com/tdatIT/go-template"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
